<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0e14" />
  <meta name="description" content="ROANTONE 2025 — consulta de cores e receitas (offline)" />
  <title>ROANTONE 2025</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">
            <h1 class="brand-title">ROANTONE 2025</h1>
            <p class="brand-sub">Consulta de cores e receitas</p>
          </div>
        </div>
        <button type="button" class="btn-ghost btn-saved-top" id="btnSaved" aria-label="Abrir cores salvas">
          <span class="btn-saved-label">Salvas</span>
          <span class="badge" id="badge">0</span>
        </button>
      </div>
    </header>

    <main class="main">
      <section class="search-block" aria-label="Buscar cor">
        <label class="field-label" for="busca">Código da cor</label>
        <div class="input-wrap">
          <input
            id="busca"
            class="input-code"
            type="text"
            inputmode="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="characters"
            spellcheck="false"
            maxlength="8"
            placeholder="Ex. AM104"
          />
          <span class="input-hint" id="hintCount" hidden></span>
        </div>
        <button type="button" class="btn-list-full" id="btnFullList">Lista completa</button>
      </section>

      <div id="viewList" class="view-list-page" hidden>
        <div class="list-top">
          <button type="button" class="btn-back" id="btnListBack">Voltar</button>
          <h2 class="list-page-title" id="listPageTitle">Lista completa</h2>
        </div>
        <div class="list-families" id="listFamilies" aria-label="Todas as cores por família"></div>
        <section class="result-wrap list-detail-wrap" id="listDetail" aria-live="polite" hidden></section>
      </div>

      <section class="result-wrap" id="res" aria-live="polite"></section>

      <div class="print-header" id="printHeader" hidden>
        <h2 class="print-title">ROANTONE 2025 — receitas</h2>
        <p class="print-sub" id="printSub"></p>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Ações">
      <p class="bottom-status" id="bbInfo">Nenhuma cor salva</p>
      <div class="bottom-actions">
        <button type="button" class="btn-secondary" id="btnShare" disabled>Compartilhar</button>
        <button type="button" class="btn-primary" id="btnPrint" disabled>Imprimir</button>
      </div>
    </nav>

    <div class="overlay" id="overlay" aria-hidden="true"></div>
    <aside class="sheet" id="panel" role="dialog" aria-modal="true" aria-labelledby="sheetTitle" aria-hidden="true">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-head">
        <h2 id="sheetTitle" class="sheet-title">Cores salvas</h2>
        <button type="button" class="btn-close" id="btnClose">Fechar</button>
      </div>
      <div class="sheet-body" id="spList"></div>
    </aside>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
  </div>

  <script defer src="js/colors-data.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>

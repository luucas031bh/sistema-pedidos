<script>
const API = "https://script.google.com/macros/s/AKfycby9LFyzYkXW_Zo9i_u3jdGfRweu5UaDvf4PsGWyTh8UB0hXGEls2l_oELjJSDkpZwDoAQ/exec?action=listarPedidos";

function diasRestantes(data){
  if(!data) return 999;
  return Math.ceil((new Date(data) - new Date()) / 86400000);
}

function classe(d){
  if(d < 0) return "atrasado";
  if(d <= 2) return "urgente";
  return "normal";
}

function formatarData(data){
  if(!data) return "-";
  return new Date(data).toLocaleDateString("pt-BR");
}

async function carregar(){
  try{
    const res = await fetch(API, {
      method: "GET",
      mode: "cors",
      redirect: "follow"
    });

    const data = await res.json();

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    let pedidos = data.pedidos.filter(p => p.cliente.nome);

    pedidos.sort((a,b)=>{
      return diasRestantes(a.datas.entrega) - diasRestantes(b.datas.entrega);
    });

    pedidos.forEach(p=>{
      const dias = diasRestantes(p.datas.entrega);
      const c = classe(dias);

      lista.innerHTML += `
        <div class="card ${c}">
          <div class="id">${p.id}</div>
          <div class="cliente">${p.cliente.nome}</div>

          <div class="info">${p.totalPecas} peças</div>

          <div class="info">
            Entrega: ${formatarData(p.datas.entrega)}
          </div>

          <div class="info">
            ${p.statusOperacional} • ${dias} dias
          </div>
        </div>
      `;
    });

  }catch(e){
    document.getElementById("lista").innerHTML =
      "Erro ao carregar pedidos";
    console.error(e);
  }
}

carregar();
</script>
